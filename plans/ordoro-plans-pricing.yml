        price: 499.00
        currency: USD
        timeFrame: month
      - name: Monthly Orders
        type: quota
        metric: orders
        limit: 1000
        timeFrame: month
      - name: Overage Orders
        type: metered
        metric: orders
        price: 100.00
        currency: USD
        unit: per 1000 additional orders
      - name: API Access
        type: boolean
        value: true

  # Dropshipping App Plans
  - name: Dropshipping Advanced
    type: paid
    description: Dropshipping management plan with 1,000 dropshipments per month, unlimited sales channels, unlimited dropship locations, unlimited users, order routing, automation rules, advanced analytics, QuickBooks integration, and API access. Overages at $100 per additional 1,000 dropshipments.
    url: https://www.ordoro.com/dropshipping-management-pricing
