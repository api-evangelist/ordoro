apis:
- aid: ordoro:ordoro-api
  name: Ordoro API
  description: 'The Ordoro REST API provides programmatic access to orders, products,
    inventory, shipments, purchase orders, suppliers, warehouses, and dropshipping
    workflows. It uses Basic HTTP Authentication with API keys and communicates via
    JSON. All endpoints are available at the base URL https://api.ordoro.com/ with
    a rate limit of 500 requests per minute.

    '
