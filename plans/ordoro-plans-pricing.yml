        type: metered
        metric: subscription
        price: 299.00
        currency: USD
        timeFrame: month
      - name: Monthly Dropshipments
        type: quota
        metric: dropshipments
        limit: 1000
        timeFrame: month
      - name: Overage Dropshipments
        type: metered
        metric: dropshipments
        price: 100.00
        currency: USD
        unit: per 1000 additional dropshipments
