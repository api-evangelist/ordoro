tags:
- name: Address
  description: Address objects are used and referenced in Orders shipping and billing addresses, Warehouses, and Suppliers.
- name: Api Key
  description: ''
- name: Authenticated
  description: ''
- name: Cart
  description: Current routes for `/cart/` are sometimes interchangeably referenced as `sales_channel`
- name: Company
  description: ''
- name: Goods Receipt
  description: Goods Receipts are used for receiving items on a Purchase Order. You may have multiple Goods Receipts per Purchase
    Order and can have multiple lines and quantities of products related to the Purchase Order.
- name: Integration
  description: Currently Ordoro offers one type of integration to QuickBooks Online. Orders can be exported from Ordoro to
    QuickBooks using the integration.
- name: Inventory Transfer
  x-internal: true
  description: More information about Inventory Transfers coming soon.
- name: Label
  description: Labels can be retrieved in a raw image format using the Label endpoints. For order specific labels refer to
    the Orders section.
- name: Order
  description: Orders are the main level of management in Ordoro. Orders have lines, warehouse associations and can be dropshipped
    or have labels created for them.
- name: Manufacturing Order
  description: Manufacturing Orders are used for creating and tracking Bill of Material orders. A Manufacturing Order is assigned
    to a warehouse and may have multiple lines and tags.
- name: Packing List
  description: A company or account may have multple packing list formats to be saved, retrieved and used for printing Order
    information.
- name: Postage Account
  description: Methods for retrieving postage account information to be used with USPS carriers.
- name: Preset
  description: ''
- name: Product
  description: ''
- name: Purchase Order
  description: ''
- name: Rate
  description: Rates are cost estimates or quotes provided by a shipping carrier or shipper. These can be retrieved per Order
    based on the order's package and address details.
- name: Return Label
  description: ''
- name: Return Tracking
  description: ''
- name: Rule
  description: ''
- name: Shipper
  description: A shipper or carrier account can be created and used to get quotes and generate labels for orders.
- name: Supplier
  description: ''
- name: Tag
  description: ''
- name: Tracking
  description: ''
- name: User
  description: ''
- name: Warehouse
  description: ''
