  /product/:
    get:
      tags:
      - Product
      summary: List Products
      description: ''
      operationId: Product_GET
      parameters:
      - $ref: '#/components/parameters/offsetParam'
      - $ref: '#/components/parameters/limitParam'
      - $ref: '#/components/parameters/searchParam'
      - name: sort
        in: query
        description: ''
        style: form
        explode: true
        schema:
          $ref: '#/components/schemas/ProductSort'
      - name: fba
        in: query
        description: 'Filter products by sales channel FBA (Fulfilled By Amazon) status. This is only applicable for products
          tied to at least one Amazon sales channel.

          * `true` will include any products that are considred FBA by at least one sales channel

          * `false` will exclude any products that are considred FBA by at least one sales channel

          '
        style: form
        schema:
          type: boolean
      - name: fbm
        in: query
        description: 'Filter products by sales channel FBM (Fulfilled By Merchant) status. This is only applicable for products
          tied to at least one Amazon sales channel.

          * `true` will include any products that are considred FBM by at least one sales channel

          * `false` will exclude any products that are considred FBM by at least one sales channel

          '
        style: form
        schema:
          type: boolean
      - name: category
        in: query
        description: Filter by product category.
        style: form
        schema:
          type: string
      - name: hs_code
        in: query
        description: Filter by product Harmonized System Code.
        style: form
        schema:
          type: string
      - name: active
        in: query
        description: Filter by active `true` or inactive `false` products.
        style: form
        schema:
          type: boolean
      - name: kit
        in: query
        description: Filter products that are `true` or are not `false` kit parents.
        style: form
        schema:
          type: boolean
      - name: kit_component
        in: query
        description: Filter products that are `true` or are not `false` kit components.
        style: form
        schema:
          type: boolean
      - name: dropship
        in: query
        description: 'Filter by dropship status.

          * `true` will return products that are either dropshippable or automatically dropshipped

          * `false` will return only products handled in house

          '
        style: form
        schema:
          type: boolean
      - name: needs_sync
        in: query
        description: Filter products who do `true` or do not `false` need have their inventory synced with one or more sales
          channels.
        style: form
        schema:
          type: boolean
      - name: supplier
        in: query
        description: 'Filter by supplier id.


          Notes: The default behavior of this param is to filter by the product''s assigned suppliers.

          However, if `reordered=true` is also passed, then this param will filter products that are listed on PO''s assigned
          to the included supplier id.

          '
        style: form
        schema:
          type: array
          items:
            type: integer
      - name: sales_channel
        in: query
        description: Filter by sales channel id. Can be repeated for multiple sales channels.
        style: form
        schema:
          type: array
          items:
            type: integer
      - name: low_inventory_aoh
        in: query
        description: Filter products with `true` or without `false` low inventory with respect to available on hand
        style: form
        schema:
          type: boolean
      - name: low_inventory_poh
        in: query
        description: Filter products with `true` or without `false` low inventory with respect to physical on hand
        style: form
        schema:
          type: boolean
      - name: to_be_shipped
        in: query
        description: Filter products with `true` or without `false` committed inventory.
        style: form
        schema:
          type: boolean
      - name: oversold
        in: query
        description: Filter products that are `true` or are not `false` oversold.
        style: form
        schema:
          type: boolean
      - name: reordered
        in: query
        description: Filter products that are `true` or are not `false` reordered. Can be refined by also including the `warehouse_id`
          param.
        style: form
        schema:
          type: boolean
      - name: overallocated
        in: query
        description: Filter products that are `true` or are not `false` overallocated. Can be refined by also including the
          `warehouse_id` param.
        style: form
        schema:
          type: boolean
      - name: tag
        in: query
        description: 'Filter by tag name. Can be repeated for multiple tags.


          Note: Cannot be included if `untagged` is also passed.

          '
        style: form
        schema:
          type: array
          items:
            type: string
      - name: untagged
        in: query
        description: 'Filter untagged products


          Note: Cannot be included if `tags` are also passed.

          '
        style: form
        schema:
          type: boolean
      - name: tag_filter_by
        in: query
        description: 'Tag filtering logic:

          * `or` [default] return products that contain any of the supplied tags

          * `and` returns products containing ALL of the supplied tags

          * `only` returns products containing ONLY the supplied tags

          * `not` returns products that do not contain one or more of the supplied tags

          '
        style: form
        explode: true
        schema:
          $ref: '#/components/schemas/tag_filter_by'
      - name: warehouse_id
        in: query
        description: Filter by warehouse id. Can be repeated for multiple warehouses.
        style: form
        explode: true
        schema:
          type: array
          items:
            type: integer
      - name: updated_after
        in: query
        description: Filter products updated after this date
        style: form
        schema:
          type: string
          format: date-time
      - name: updated_before
        in: query
        description: Filter products updated before this date
        style: form
        schema:
          type: string
          format: date-time
      - name: cart
        in: query
        description: Deprecated. Use `sales_channel` instead.
        style: form
        explode: true
        schema:
          type: integer
        deprecated: true
      responses:
        '200':
          description: ''
          headers: {}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/product_list'
      deprecated: false
    post:
      tags:
      - Product
      summary: Create a Product
      operationId: Product_POST
      description: ''
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/post_product'
      responses:
        '201':
          description: ''
          headers: {}
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/product'
      deprecated: false
