aid: ordoro
name: Ordoro
description: 'Ordoro is a multi-channel order management and ecommerce logistics platform
  designed for small and medium-sized businesses. It provides a REST API for syncing
  orders across sales channels, managing inventory in multiple warehouses, creating
  shipping labels from major carriers, and handling dropshipping workflows with suppliers.
  The API supports operations including order retrieval and creation, product and
  inventory management, purchase orders, manufacturing orders, and shipment tracking.
  API access is available on Premium-level plans and above, using Basic HTTP Authentication
  with API keys.

  '
type: Index
